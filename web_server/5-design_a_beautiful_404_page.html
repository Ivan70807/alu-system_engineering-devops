<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1f2937, #111827);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 7rem;
            margin: 0;
            color: #60a5fa;
        }

        h2 {
            font-size: 2rem;
            margin-top: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #d1d5db;
            margin-top: 20px;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            text-decoration: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            transition: background 0.3s;
        }

        a:hover {
            background: #2563eb;
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>404</h1>
        <h2>Lost in Space</h2>

        <p><strong>Ceci n'est pas une page</strong></p>

        <p>
            The page you're looking for has drifted into another galaxy.
            Let's get you safely back home.
        </p>

        <a href="/">Go Home</a>
    </div>
</body>
</html>
